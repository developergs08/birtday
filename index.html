<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Premium Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  color: white;
}

video.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

.container {
  text-align: center;
  padding-top: 60px;
}

h1 {
  font-size: 4em;
  font-family: 'Pacifico';
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 40px #ff00ff; }
}

#typing {
  font-size: 2em;
  margin-top: 20px;
  height: 50px;
}

.btn {
  margin-top: 30px;
  padding: 15px 30px;
  border: none;
  border-radius: 30px;
  font-size: 1.2em;
  cursor: pointer;
  background: linear-gradient(45deg, #ff1493, #ff6f61);
}

/* BALLOONS */
.balloon {
  position: absolute;
  width: 40px;
  height: 50px;
  border-radius: 50%;
  animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-120vh); }
}

/* HEARTS */
.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  transform: rotate(45deg);
}

.heart::before, .heart::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
}

.heart::before { top: -10px; }
.heart::after { left: -10px; }

/* FIREWORK */
.firework {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: white;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}

#surprise {
  margin-top: 20px;
  font-size: 1.5em;
  color: yellow;
}

</style>
</head>

<body>

<video class="bg" autoplay muted loop>
  <source src="videos/birthday.mp4" type="video/mp4">
</video>

<audio id="music" autoplay loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<div class="overlay"></div>

<div class="container">
  <h1>🎉 Happy Birthday 🎉</h1>
  <div id="typing"></div>
  <button class="btn" onclick="startSurprise()">Celebrate 🎁</button>
  <div id="surprise"></div>
</div>

<script>

// TYPING EFFECT
const text = "Kinjal 💖 The most delightful and colorful soul!";
let i = 0;
function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  }
}
typing();

// SURPRISE
function startSurprise() {
  document.getElementById('surprise').innerText =
  "Wishing you endless happiness, magical memories, and crazy fun moments! 🌈✨";

  balloons();
  hearts();
  fireworks();
}

// BALLOONS
function balloons() {
  for (let i = 0; i < 20; i++) {
    let b = document.createElement('div');
    b.className = 'balloon';
    b.style.left = Math.random()*100+'vw';
    b.style.background = `hsl(${Math.random()*360},100%,60%)`;
    document.body.appendChild(b);
  }
}

// HEARTS
function hearts() {
  for (let i = 0; i < 30; i++) {
    let h = document.createElement('div');
    h.className = 'heart';
    h.style.left = Math.random()*100+'vw';
    h.style.top = Math.random()*100+'vh';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  }
}

// FIREWORKS
function fireworks() {
  for (let i = 0; i < 100; i++) {
    let f = document.createElement('div');
    f.className = 'firework';
    f.style.left = '50%';
    f.style.top = '50%';
    f.style.setProperty('--x', (Math.random()*400-200)+'px');
    f.style.setProperty('--y', (Math.random()*400-200)+'px');
    f.style.background = `hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}

</script>

</body>
</html>
